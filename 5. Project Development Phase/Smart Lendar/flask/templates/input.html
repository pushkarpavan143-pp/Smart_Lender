<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Evaluation Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-card { border: none; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; color: #34495e; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Loan Application Assessment</h2>
                    <p class="text-muted">Fill out the form fields completely to run the predictive qualification layer.</p>
                </div>

                <div class="card form-card p-4 bg-white">
                    <form action="/predict" method="POST">
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control form-control-lg" name="name" id="name" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label for="UserEmail" class="form-label">Email Address</label>
                                <input type="email" class="form-control form-control-lg" name="UserEmail" id="UserEmail" placeholder="name@example.com" required>
                            </div>
                        </div>

                        <hr class="text-muted my-4">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="income" class="form-label">Annual Income (₹)</label>
                                <input type="number" class="form-control" name="income" id="income" placeholder="e.g. 65000" required>
                            </div>
                            <div class="col-md-6">
                                <label for="credit_score" class="form-label">Credit Score (300 - 850)</label>
                                <input type="number" class="form-control" name="credit_score" id="credit_score" min="300" max="850" placeholder="e.g. 720" required>
                            </div>
                            <div class="col-md-6">
                                <label for="loan_amount" class="form-label">Requested Loan Amount (₹)</label>
                                <input type="number" class="form-control" name="loan_amount" id="loan_amount" placeholder="e.g. 30000" required>
                            </div>
                            <div class="col-md-3">
                                <label for="years_employed" class="form-label">Years Employed</label>
                                <input type="number" class="form-control" name="years_employed" id="years_employed" placeholder="e.g. 4" required>
                            </div>
                            <div class="col-md-3">
                                <label for="points" class="form-label">Risk Points (0-100)</label>
                                <input type="number" step="0.1" class="form-control" name="points" id="points" placeholder="e.g. 45.5" required>
                            </div>
                        </div>

                        <div class="mt-4 pt-2">
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" style="background: #1a365d; border: none;">Evaluate Eligibility Profile</button>
                        </div>
                    </form>
                </div>
                
                <div class="text-center mt-3">
                    <a href="/" class="text-decoration-none text-muted small">← Return to Home Screen</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
